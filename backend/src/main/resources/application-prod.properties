spring.application.name=fintech-platform

# ------------------------------
# Database Configuration
# ------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP tuning to reduce startup and connection delay
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=300000         # 5 minutes
spring.datasource.hikari.max-lifetime=1800000        # 30 minutes
spring.datasource.hikari.connection-timeout=30000    # 30 seconds
spring.datasource.hikari.pool-name=HikariPool-1
spring.datasource.hikari.connection-test-query=SELECT 1

# ------------------------------
# JPA / Hibernate Configuration
# ------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Reduce startup scanning time (optional if package is large)
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# ------------------------------
# JWT Configuration
# ------------------------------
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationPleaseChangeThisInProduction256Bits}
jwt.expiration=86400000
jwt.refresh.expiration=604800000

# ------------------------------
# Server Configuration
# ------------------------------
server.port=${PORT}
server.address=0.0.0.0
server.error.include-message=always

# ------------------------------
# Logging
# ------------------------------
logging.level.com.fintech=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=ERROR
logging.level.org.springframework.web.socket.sockjs=ERROR  # Hide SockJS warnings

# ------------------------------
# Email Configuration
# ------------------------------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

# Application Email
app.mail.from=${SPRING_MAIL_USERNAME:noreply@example.com}
app.name=NexaVault

# ------------------------------
# Actuator - Simple health check only
# ------------------------------
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.health.mail.enabled=false
management.health.db.enabled=true

# ------------------------------
# CORS Configuration
# ------------------------------
cors.allowed.origins=https://nexavault-frontend.onrender.com,http://localhost:4200,http://localhost

# ------------------------------
# WebSocket / SockJS Config
# ------------------------------
# Allow only specific origins to prevent the warnings
spring.websocket.allowed-origins=https://nexavault-frontend.onrender.com,http://localhost:4200,http://localhost

# Optional: reduce WebSocket startup overhead
spring.websocket.sockjs.enabled=true
spring.websocket.sockjs.client-library-url=/webjars/sockjs-client/sockjs.min.js