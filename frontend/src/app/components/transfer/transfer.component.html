

    <div class="page-header">
      <h1>Transfer Money</h1>
    </div>

    <div class="transfer-container">
        <div *ngIf="successMessage" class="alert alert-success">
          {{ successMessage }}
        </div>

        <div *ngIf="errorMessage" class="alert alert-error">
          {{ errorMessage }}
        </div>
    </div>

        <form (ngSubmit)="onSubmit()">
          <div class="form-group">
            <label for="fromAccount">From Account</label>
            <select
              id="fromAccount"
              name="fromAccount"
              [(ngModel)]="transferData.fromAccountId"
              required
              [disabled]="isLoading"
            >
              <option value="0">Select an account</option>
              <option *ngFor="let account of accounts" [value]="account.id">
                {{ account.accountNumber }} - {{ account.accountType }}
                ({{ formatCurrency(account.balance) }})
              </option>
            </select>
          </div>

          <div class="form-group">
            <label for="toAccount">To Account Number</label>
            <input
              type="text"
              id="toAccount"
              name="toAccount"
              [(ngModel)]="transferData.toAccountNumber"
              placeholder="Enter recipient's account number"
              required
              [disabled]="isLoading"
            />
          </div>

          <div class="form-group">
            <label for="amount">Amount (INR)</label>
            <input
              type="number"
              id="amount"
              name="amount"
              [(ngModel)]="transferData.amount"
              placeholder="0.00"
              step="1"
              min="1"
              required
              [disabled]="isLoading"
            />
          </div>

          <div class="form-group">
            <label for="description">Description (Optional)</label>
            <textarea
              id="description"
              name="description"
              [(ngModel)]="transferData.description"
              placeholder="Add a note..."
              rows="3"
              [disabled]="isLoading"
            ></textarea>
          </div>

          <div class="form-actions">
            <button
              type="button"
              class="btn btn-secondary"
              routerLink="/dashboard"
              [disabled]="isLoading"
            >
              Cancel
            </button>
            <button
              type="submit"
              class="btn btn-primary"
              [disabled]="isLoading"
            >
              <span *ngIf="!isLoading">Transfer Money</span>
              <span *ngIf="isLoading">Processing...</span>
            </button>
          </div>
        </form>
