<div class="auth-outer-container">
  <div class="auth-inner-container">
    <div class="auth-card card">
      <div class="auth-header">
        <h1>Reset Password</h1>
        <p class="text-muted">
          <span *ngIf="step === 'email'">Enter your email to receive OTP</span>
          <span *ngIf="step === 'otp'">Enter the OTP sent to {{ email }}</span>
          <span *ngIf="step === 'password'">Create your new password</span>
        </p>
      </div>

      <div *ngIf="successMessage" class="alert alert-success">
        {{ successMessage }}
      </div>

      <div *ngIf="errorMessage" class="alert alert-error">
        {{ errorMessage }}
      </div>

      <!-- Step 1: Enter Email -->
      <form *ngIf="step === 'email'" (ngSubmit)="sendOTP()">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            [(ngModel)]="email"
            placeholder="Enter your registered email"
            required
            [disabled]="isLoading"
          />
        </div>

        <button
          type="submit"
          class="btn btn-primary btn-block"
          [disabled]="isLoading">
          <span *ngIf="!isLoading">Send OTP</span>
          <span *ngIf="isLoading">Sending...</span>
        </button>
      </form>

      <!-- Step 2: Enter OTP -->
      <form *ngIf="step === 'otp'" (ngSubmit)="verifyOTP()">
        <div class="form-group">
          <label for="otp">Enter OTP</label>
          <input
            type="text"
            id="otp"
            name="otp"
            [(ngModel)]="otp"
            placeholder="Enter 6-digit OTP"
            maxlength="6"
            required
            [disabled]="isLoading"
            class="otp-input"
          />
          <small class="text-muted">OTP valid for 10 minutes</small>
        </div>

        <button
          type="submit"
          class="btn btn-primary btn-block"
          [disabled]="isLoading">
          <span *ngIf="!isLoading">Verify OTP</span>
          <span *ngIf="isLoading">Verifying...</span>
        </button>

        <button
          type="button"
          class="btn btn-secondary btn-block mt-2"
          (click)="resendOTP()"
          [disabled]="isLoading">
          Resend OTP
        </button>
      </form>

      <!-- Step 3: Create New Password -->
      <form *ngIf="step === 'password'" (ngSubmit)="resetPassword()">
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <div class="password-input-wrapper">
            <input
              [type]="showPassword ? 'text' : 'password'"
              id="newPassword"
              name="newPassword"
              [(ngModel)]="newPassword"
              placeholder="Enter new password (min 12 chars)"
              required
              [disabled]="isLoading"
            />
            <div class="eye-icon-wrapper">
              <button
                type="button"
                class="eye-icon-btn"
                (click)="togglePasswordVisibility()"
                tabindex="-1"
              >
                <span *ngIf="!showPassword"><img src="/hidden.png" alt="hidden"></span>
                <span *ngIf="showPassword"><img src="/views.png" alt="view"></span>
              </button>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            [(ngModel)]="confirmPassword"
            placeholder="Re-enter new password"
            required
            [disabled]="isLoading"
          />
        </div>

        <button
          type="submit"
          class="btn btn-primary btn-block"
          [disabled]="isLoading">
          <span *ngIf="!isLoading">Reset Password</span>
          <span *ngIf="isLoading">Resetting...</span>
        </button>
      </form>

      <div class="auth-footer">
        <p class="text-muted">
          Remember your password?
          <a routerLink="/login">Back to Login</a>
        </p>
      </div>
    </div>
  </div>
</div>
